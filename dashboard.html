<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker - Dashboard</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-[#F8FAFC]">
    <header class="flex items-center px-[5%] py-4 bg-white shadow-sm">
        <div class="flex flex-1 items-center space-x-1">
            <img src="./assets/github-logo.png" alt="github logo" class="w-8 h-8">
            <h1 class="text-2xl">Github Issue Tracker</h1>
        </div>
        <div class="flex items-center space-x-4">
            <label id="search-input" class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary">+ New Issue</button>
        </div>
    </header>

    <div class="container mx-auto py-16 space-y-4">
        <div id="nav-btns" class="flex gap-2 bg-white p-4 shadow-sm rounded-md">
            <button value="all" class="btn btn-primary">All</button>
            <button value="open" class="btn">Open</button>
            <button value="closed" class="btn">Closed</button>
        </div>

        <div class="bg-[#FBFBFB] rounded-md shadow-sm">
            <div class="flex items-center p-4 bg-white shadow-sm rounded-t-md">
                <img src="./assets/Aperture.png" alt="aperture" class="mr-4">
                <div class="flex-1">
                    <p class="font-semibold text-lg"><span id="issues-counter">0</span> Issues</p>
                    <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>
                <div class="space-x-4">
                    <div class="inline-flex items-center">
                        <span class="indicator-item status bg-[#00A96E]"></span>
                        <span class="ms-1">Open</span>
                    </div>
                    <div class="inline-flex items-center">
                        <span class="indicator-item status bg-[#A855F7]"></span>
                        <span class="ms-1">Closed</span>
                    </div>
                </div>
            </div>

            <!-- issues container -->
            <div class="relative">
                <div id="issues-container" class="grid grid-cols-1 p-4 gap-4 md:grid-cols-2 lg:grid-cols-4">
                    <span class="loading loading-spinner loading-xl absolute z-100 top-[100px] left-1/2"></span>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="details_modal" class="modal modal-bottom sm:modal-middle">
        
    </dialog>

    <script src="dashboard.js""></script>
</body>
</html>
